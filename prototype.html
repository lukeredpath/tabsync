<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bass Tab Sync Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Config panel ── */
    #config {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }

    .field-group input[type="text"] {
      width: 280px;
      background: #252525;
      border: 1px solid #444;
      border-radius: 6px;
      color: #eee;
      padding: 6px 10px;
      font-size: 13px;
    }

    .field-group input[type="number"] {
      width: 90px;
      background: #252525;
      border: 1px solid #444;
      border-radius: 6px;
      color: #eee;
      padding: 6px 10px;
      font-size: 13px;
    }

    .field-group input:focus {
      outline: none;
      border-color: #f90;
    }

    .inline-fields {
      display: flex;
      gap: 8px;
    }

    #loadBtn {
      background: #f90;
      color: #000;
      font-weight: 600;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      cursor: pointer;
      align-self: flex-end;
    }

    #loadBtn:hover { background: #ffaa22; }

    /* ── Main area ── */
    #stage {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Tab video fills the stage */
    #tab-container {
      width: 100%;
      height: 100%;
    }

    #tab-container iframe {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Audio video: small overlay bottom-right */
    #audio-container {
      position: absolute;
      bottom: 72px;
      right: 16px;
      width: 240px;
      aspect-ratio: 16/9;
      border: 2px solid #555;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      cursor: move;
      user-select: none;
    }

    #audio-container iframe,
    #audio-player-wrapper,
    #audio-player-wrapper > div {
      width: 100%;
      height: 100%;
      display: block;
    }

    #audio-container iframe {
      pointer-events: none; /* prevent iframe capturing drag */
    }

    #audio-label {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 10px;
      background: rgba(0,0,0,0.7);
      color: #aaa;
      padding: 2px 5px;
      border-radius: 3px;
      pointer-events: none;
    }

    /* ── Controls bar ── */
    #controls {
      height: 60px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 20px;
    }

    .ctrl-btn {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #eee;
      font-size: 13px;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .ctrl-btn:hover { background: #3a3a3a; }
    .ctrl-btn:disabled { opacity: 0.35; cursor: default; }

    #playPauseBtn {
      background: #f90;
      color: #000;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 32px;
      border: none;
    }

    #playPauseBtn:hover:not(:disabled) { background: #ffaa22; }

    #status {
      font-size: 12px;
      color: #666;
      min-width: 120px;
      text-align: center;
    }

    #placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 12px;
      color: #444;
    }

    #placeholder svg { opacity: 0.3; }
    #placeholder p { font-size: 15px; }
  </style>
</head>
<body>

<!-- ── Configuration ── -->
<div id="config">
  <div class="field-group">
    <label>Tab Video URL (main, muted)</label>
    <input type="text" id="tabUrl" placeholder="https://www.youtube.com/watch?v=..." />
  </div>
  <div class="field-group">
    <label>Tab Start (seconds)</label>
    <input type="number" id="tabStart" value="0" min="0" step="0.5" />
  </div>
  <div class="field-group">
    <label>Audio Video URL (small overlay)</label>
    <input type="text" id="audioUrl" placeholder="https://www.youtube.com/watch?v=..." />
  </div>
  <div class="field-group">
    <label>Audio Start (seconds)</label>
    <input type="number" id="audioStart" value="0" min="0" step="0.5" />
  </div>
  <button id="loadBtn">Load</button>
</div>

<!-- ── Stage ── -->
<div id="stage">
  <div id="tab-container">
    <div id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <p>Enter URLs above and click Load</p>
    </div>
  </div>
  <div id="audio-container" style="display:none;">
    <div id="audio-label">Audio only</div>
    <div id="audio-player-wrapper"></div>
  </div>
</div>

<!-- ── Controls ── -->
<div id="controls">
  <button class="ctrl-btn" id="rewindBtn" disabled>↩ Restart</button>
  <button class="ctrl-btn" id="skipBackBtn" disabled>−5s</button>
  <button id="playPauseBtn" class="ctrl-btn" disabled>▶ Play</button>
  <button class="ctrl-btn" id="skipFwdBtn" disabled>+5s</button>
  <div id="status">Not loaded</div>
</div>

<script>
  // ── YouTube IFrame API bootstrap ──
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  let tabPlayer = null;
  let audioPlayer = null;
  let playersReady = 0;
  let syncInterval = null;
  let isPlaying = false;

  // Parsed config (set on Load)
  let cfg = { tabId: '', audioId: '', tabStart: 0, audioStart: 0 };

  // ── Utility ──
  function extractVideoId(url) {
    const m = url.match(/(?:youtube\.com\/(?:[^/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?/\s]{11})/);
    return m ? m[1] : null;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function setControlsEnabled(enabled) {
    ['rewindBtn','skipBackBtn','playPauseBtn','skipFwdBtn'].forEach(id => {
      document.getElementById(id).disabled = !enabled;
    });
  }

  // ── localStorage persistence ──
  const STORAGE_KEY = 'bass-sync-config';

  function saveConfig() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tabUrl:    document.getElementById('tabUrl').value.trim(),
      audioUrl:  document.getElementById('audioUrl').value.trim(),
      tabStart:  document.getElementById('tabStart').value,
      audioStart: document.getElementById('audioStart').value,
    }));
  }

  function restoreConfig() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!saved) return;
      if (saved.tabUrl)    document.getElementById('tabUrl').value    = saved.tabUrl;
      if (saved.audioUrl)  document.getElementById('audioUrl').value  = saved.audioUrl;
      if (saved.tabStart  != null) document.getElementById('tabStart').value  = saved.tabStart;
      if (saved.audioStart != null) document.getElementById('audioStart').value = saved.audioStart;
    } catch {}
  }

  restoreConfig();

  // ── Load ──
  document.getElementById('loadBtn').addEventListener('click', () => {
    const tabUrl   = document.getElementById('tabUrl').value.trim();
    const audioUrl = document.getElementById('audioUrl').value.trim();
    const tabStart = parseFloat(document.getElementById('tabStart').value) || 0;
    const audioStart = parseFloat(document.getElementById('audioStart').value) || 0;

    const tabId   = extractVideoId(tabUrl);
    const audioId = extractVideoId(audioUrl);

    if (!tabId)   { alert('Invalid Tab Video URL'); return; }
    if (!audioId) { alert('Invalid Audio Video URL'); return; }

    saveConfig();

    cfg = { tabId, audioId, tabStart, audioStart };
    playersReady = 0;
    isPlaying = false;
    clearInterval(syncInterval);
    setControlsEnabled(false);
    setStatus('Loading...');

    buildPlayers();
  });

  function buildPlayers() {
    // Tab player — full stage div
    const tabContainer = document.getElementById('tab-container');
    tabContainer.innerHTML = '<div id="tab-player"></div>';

    tabPlayer = new YT.Player('tab-player', {
      videoId: cfg.tabId,
      playerVars: {
        autoplay: 0,
        controls: 1,
        mute: 1,
        rel: 0,
        modestbranding: 1,
        start: Math.floor(cfg.tabStart),
      },
      events: {
        onReady: onPlayerReady,
        onStateChange: onTabStateChange,
        onError: (e) => setStatus(`Tab video error (${e.data}) — embedding may be disabled`),
      }
    });

    // Audio player — small overlay
    const wrapper = document.getElementById('audio-player-wrapper');
    wrapper.innerHTML = '<div id="audio-player"></div>';

    audioPlayer = new YT.Player('audio-player', {
      videoId: cfg.audioId,
      playerVars: {
        autoplay: 0,
        controls: 1,
        mute: 0,
        rel: 0,
        modestbranding: 1,
        start: Math.floor(cfg.audioStart),
      },
      events: {
        onReady: onPlayerReady,
        onError: (e) => setStatus(`Audio video error (${e.data}) — embedding may be disabled`),
      }
    });

    document.getElementById('audio-container').style.display = 'block';
  }

  function onPlayerReady() {
    playersReady++;
    if (playersReady === 2) {
      // Seek both to their start positions (handles fractional seconds)
      tabPlayer.seekTo(cfg.tabStart, true);
      tabPlayer.pauseVideo();
      audioPlayer.seekTo(cfg.audioStart, true);
      audioPlayer.pauseVideo();
      setControlsEnabled(true);
      setStatus('Ready');
      document.getElementById('playPauseBtn').textContent = '▶ Play';
    }
  }

  // ── Sync engine ──
  // We anchor to elapsed wall-clock time from when we last pressed play.
  let playStartWallTime = null;
  let playStartTabTime = null;
  let playStartAudioTime = null;
  const SYNC_THRESHOLD = 0.4; // seconds — resync if drift exceeds this

  function startSync() {
    playStartWallTime = performance.now() / 1000;
    playStartTabTime   = tabPlayer.getCurrentTime();
    playStartAudioTime = audioPlayer.getCurrentTime();

    clearInterval(syncInterval);
    syncInterval = setInterval(() => {
      if (!isPlaying) return;
      const elapsed = performance.now() / 1000 - playStartWallTime;
      const expectedTab   = playStartTabTime   + elapsed;
      const expectedAudio = playStartAudioTime + elapsed;

      const tabDrift   = Math.abs(tabPlayer.getCurrentTime()   - expectedTab);
      const audioDrift = Math.abs(audioPlayer.getCurrentTime() - expectedAudio);

      if (tabDrift > SYNC_THRESHOLD) {
        tabPlayer.seekTo(expectedTab, true);
      }
      if (audioDrift > SYNC_THRESHOLD) {
        audioPlayer.seekTo(expectedAudio, true);
      }
    }, 1000);
  }

  // ── Controls ──
  document.getElementById('playPauseBtn').addEventListener('click', () => {
    if (!tabPlayer || !audioPlayer) return;
    if (isPlaying) {
      pause();
    } else {
      play();
    }
  });

  document.getElementById('rewindBtn').addEventListener('click', () => {
    if (!tabPlayer || !audioPlayer) return;
    const wasPlaying = isPlaying;
    pause();
    tabPlayer.seekTo(cfg.tabStart, true);
    audioPlayer.seekTo(cfg.audioStart, true);
    if (wasPlaying) play();
  });

  document.getElementById('skipBackBtn').addEventListener('click', () => seek(-5));
  document.getElementById('skipFwdBtn').addEventListener('click',  () => seek(+5));

  function play() {
    tabPlayer.playVideo();
    audioPlayer.playVideo();
    isPlaying = true;
    document.getElementById('playPauseBtn').textContent = '⏸ Pause';
    setStatus('Playing');
    startSync();
  }

  function pause() {
    tabPlayer.pauseVideo();
    audioPlayer.pauseVideo();
    isPlaying = false;
    clearInterval(syncInterval);
    document.getElementById('playPauseBtn').textContent = '▶ Play';
    setStatus('Paused');
  }

  function seek(delta) {
    if (!tabPlayer || !audioPlayer) return;
    const wasPlaying = isPlaying;
    if (wasPlaying) { tabPlayer.pauseVideo(); audioPlayer.pauseVideo(); }
    tabPlayer.seekTo(tabPlayer.getCurrentTime()     + delta, true);
    audioPlayer.seekTo(audioPlayer.getCurrentTime() + delta, true);
    if (wasPlaying) {
      setTimeout(() => {
        tabPlayer.playVideo();
        audioPlayer.playVideo();
        startSync();
      }, 150);
    }
  }

  // Pause audio when tab video ends
  function onTabStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
      pause();
      setStatus('Ended');
    }
  }

  // ── Draggable audio overlay ──
  const audioBox = document.getElementById('audio-container');
  let drag = { active: false, startX: 0, startY: 0, origX: 0, origY: 0 };

  audioBox.addEventListener('mousedown', e => {
    drag.active = true;
    drag.startX = e.clientX;
    drag.startY = e.clientY;
    const rect = audioBox.getBoundingClientRect();
    drag.origX = rect.left;
    drag.origY = rect.top;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!drag.active) return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;
    audioBox.style.left   = (drag.origX + dx) + 'px';
    audioBox.style.top    = (drag.origY + dy) + 'px';
    audioBox.style.bottom = 'auto';
    audioBox.style.right  = 'auto';
  });

  document.addEventListener('mouseup', () => { drag.active = false; });

  // ── YouTube API global callback ──
  window.onYouTubeIframeAPIReady = () => {
    // API ready — players are built on demand when Load is clicked
    setStatus('API ready');
  };

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space')       { e.preventDefault(); document.getElementById('playPauseBtn').click(); }
    if (e.code === 'ArrowLeft')   seek(-5);
    if (e.code === 'ArrowRight')  seek(+5);
    if (e.code === 'KeyR')        document.getElementById('rewindBtn').click();
  });
</script>
</body>
</html>
